version: "0.5.1.0"
targetAbi: "10.11.0.0"
framework: "net9.0"
overview: "Pre-transcode media to an admin-defined compatibility baseline."
description: >
  Proactively converts library media in the background &mdash; once, ahead of time &mdash;
  into a format the admin defines as their compatibility baseline. Eliminates repeated
  live CPU transcoding for the same files on every playback. Every encoding parameter is
  admin-configurable; nothing is hardcoded. A Jellyfin-native alternative to Tdarr/Unmanic.
category: "General"
# owner: set this to your GitHub username/org before publishing to a plugin repository.
owner: "mugurc"
artifacts:
- "Jellyfin.Plugin.PreTranscode.dll"
changelog: >
  0.5.1.0 - Fixes the automatic library sweep re-transcoding files it had already produced output
  for. In the separate-directory and add-as-alternate-version modes the original source is left
  unchanged, so every daily sweep re-queued and re-encoded the same files, piling up duplicate
  outputs. A source is now skipped when the profile's expected output already exists on disk
  (robust — this survives clearing the job queue) or the queue records a completed transcode for it,
  and a source that keeps failing is no longer auto-retried after 3 attempts (it can still be
  requeued manually from the queue page).
