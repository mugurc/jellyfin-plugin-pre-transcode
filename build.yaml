changelog: >
  0.3.0.0 - Adds a "Scan library now" button (plugin page and queue page) so a sweep can be
  triggered on demand instead of waiting for the schedule; puts the queue/status page in the
  dashboard sidebar as its own entry; and shows elapsed time plus an estimated time remaining
  for running jobs (and total duration for finished ones). Sweeps are now guarded so the
  scheduled task, the post-scan hook and the button can never overlap.
