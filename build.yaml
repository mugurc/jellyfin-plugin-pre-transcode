changelog: >
  0.5.2.0 - Fixes mp4 sources failing within seconds of starting whenever the output container is
  Matroska. Subtitles in an mp4 are mov_text, which Matroska cannot store, so copying them made the
  muxer reject the output header and abort the whole transcode (ffmpeg exit code 218, "Function not
  implemented"). Subtitle tracks are now handled individually: those the output container can store
  are copied verbatim, and the rest are converted to a text format it can (srt, or WebVTT for webm).
  mp4 sources therefore transcode successfully and keep their subtitles instead of losing them.
  Failed jobs on the queue page now expose the ffmpeg output that caused the failure.
