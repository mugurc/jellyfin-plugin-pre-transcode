version: "0.6.0.0"
targetAbi: "10.11.0.0"
framework: "net9.0"
overview: "Pre-transcode media to an admin-defined compatibility baseline."
description: >
  Proactively converts library media in the background &mdash; once, ahead of time &mdash;
  into a format the admin defines as their compatibility baseline. Eliminates repeated
  live CPU transcoding for the same files on every playback. Every encoding parameter is
  admin-configurable; nothing is hardcoded. A Jellyfin-native alternative to Tdarr/Unmanic.
category: "General"
# owner: set this to your GitHub username/org before publishing to a plugin repository.
owner: "mugurc"
artifacts:
- "Jellyfin.Plugin.PreTranscode.dll"
changelog: >
  0.6.0.0 - Adds on-demand single-item pre-transcoding. From the Queue &amp; status page there is now a
  "Transcode a single item" panel: search for a movie or episode by name, pick an encoding profile, and
  queue just that one &mdash; independent of the trigger rules and the automatic sweep (it is still skipped
  at run time if the item is already compliant with the chosen profile). Also fixes the queue list appearing
  frozen during a slow (e.g. 4K) encode: the progress bar, elapsed time and estimated time remaining now keep
  updating while a job runs, instead of only redrawing when the whole-number percent changed.
