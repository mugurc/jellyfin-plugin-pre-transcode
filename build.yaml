changelog: >
  0.5.0.0 - Settings page redesign for clarity: the profile editor is grouped into labelled
  Video / Resolution / Audio / HDR / Output sections, fields that don't apply are now hidden
  (e.g. CRF only shows in constant-quality mode, bitrate fields only in bitrate mode, the
  alternate-version label only for that output mode), every field carries an inline explanation,
  and advanced ffmpeg arguments are tucked into a collapsed section. The encoder preset is now a
  real dropdown when ffmpeg enumerates presets (e.g. libx264/x265), falling back to a free-text
  field with suggestions for encoders it can't. The Queue & status page gains a "Cancel all"
  button that stops every pending and processing job at once.
