changelog: >
  0.5.3.0 - Reliability, safety and performance release.
  Stops the same episode being queued and transcoded more than once (the duplicate "... (1)" outputs):
  the enqueue idempotency check is now race-free, and the worker skips a job whose output already exists.
  Pausing the queue now also pauses the running encode at the OS level and resumes it where it left off,
  instead of only stopping new jobs. Replace-in-place is now crash-safe across Docker mounts (no more
  truncated original if the server restarts mid-write), and never overwrites an unrelated file.
  "copy" video profiles no longer re-transcode forever; compliance and rules now consider every audio
  track, not just the first. Removing or cancelling a running job now actually stops its ffmpeg.
  Security hardening: ffprobe/ffmpeg arguments are passed safely (a crafted filename can no longer inject
  options) and the input is restricted to local-file protocols. Performance: ffprobe results are cached so
  unchanged files are not re-probed every sweep, and the sweep no longer does work that grows with the
  square of the library size. Plus queue-durability, verification and queue-page fixes.
