overview: "Pre-transcode media to an admin-defined compatibility baseline."
description: >
  Proactively converts library media in the background &mdash; once, ahead of time &mdash;
  into a format the admin defines as their compatibility baseline. Eliminates repeated
  live CPU transcoding for the same files on every playback. Every encoding parameter is
  admin-configurable; nothing is hardcoded. A Jellyfin-native alternative to Tdarr/Unmanic.
category: "General"
