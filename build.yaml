owner: "mugurc"
artifacts:
- "Jellyfin.Plugin.PreTranscode.dll"
changelog: >
  0.4.0.0 - Preserves every audio track (all languages) on transcode: a track already in the
  target codec is copied losslessly, the rest are re-encoded, and each is downmixed only if it
  individually exceeds the channel cap. For Matroska (mkv) outputs, all subtitle tracks and
  embedded fonts (for ASS/SSA) are carried across as well. Fixes resolution presets and trigger
  rules multiplying on every server start/update (constructor-seeded defaults were appended to,
  rather than replacing, the saved configuration on each load); pre-existing duplicates are now
  cleaned up automatically on load. Newly-added items still being copied or downloaded are now
  deferred and re-checked until the file settles, so "queue new items automatically" fires
  shortly after a file lands instead of waiting for the daily sweep.
