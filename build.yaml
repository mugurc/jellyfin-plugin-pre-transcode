changelog: >
  0.5.4.0 - Fixes TV episodes appearing twice in Jellyfin when using the "add as alternate version" output
  mode. The transcode is registered as an alternate version of the source through a Jellyfin database link,
  but the plugin fired one merge per completed episode and forced a full library scan each time; those
  scans re-indexed the freshly-written file concurrently with the merge, and with no locking it was
  last-writer-wins, so some episodes collapsed into one entry and others were left as a visible duplicate.
  Merges are now serialized and no longer force a library scan (Jellyfin already re-indexes an added file
  on its own), and the link is applied to the canonical item. Note: Jellyfin's filename-based version
  grouping is movies-only, so TV alternate versions rely entirely on this link; if your setup still shows
  a duplicate, merge the two entries once from the dashboard, or use the "replace in place" output mode.
